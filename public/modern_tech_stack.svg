<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f2fe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0e7fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cloudGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="500" height="500" fill="url(#bgGradient)"/>

  <!-- Floating cloud icon at top -->
  <g transform="translate(80, 60)">
    <ellipse cx="40" cy="35" rx="35" ry="25" fill="url(#cloudGradient)" opacity="0.9"/>
    <ellipse cx="15" cy="40" rx="20" ry="18" fill="url(#cloudGradient)" opacity="0.9"/>
    <ellipse cx="65" cy="40" rx="22" ry="18" fill="url(#cloudGradient)" opacity="0.9"/>
  </g>

  <!-- Central tech stack layers -->
  <g transform="translate(150, 120)">
    <!-- Bottom layer - Database -->
    <rect x="30" y="180" width="140" height="60" rx="8" fill="#e0e7ff" stroke="#818cf8" stroke-width="2"/>
    <circle cx="55" cy="205" r="6" fill="#818cf8"/>
    <circle cx="85" cy="205" r="6" fill="#818cf8"/>
    <circle cx="115" cy="205" r="6" fill="#818cf8"/>
    <circle cx="145" cy="205" r="6" fill="#818cf8"/>
    <text x="100" y="240" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#4f46e5">Database</text>

    <!-- Middle layer - Backend -->
    <rect x="30" y="100" width="140" height="60" rx="8" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
    <path d="M 50 130 L 60 115 L 70 130 M 90 130 L 100 115 L 110 130 M 130 130 L 140 115 L 150 130" stroke="#ec4899" stroke-width="2" fill="none"/>
    <text x="100" y="160" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#be185d">Backend</text>

    <!-- Top layer - Frontend -->
    <rect x="30" y="20" width="140" height="60" rx="8" fill="#dbeafe" stroke="#0ea5e9" stroke-width="2"/>
    <rect x="45" y="35" width="20" height="20" fill="#0ea5e9" rx="2"/>
    <rect x="75" y="35" width="20" height="20" fill="#0ea5e9" rx="2"/>
    <rect x="105" y="35" width="20" height="20" fill="#0ea5e9" rx="2"/>
    <text x="100" y="80" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#0369a1">Frontend</text>
  </g>

  <!-- Right side - Server/Connections -->
  <g transform="translate(320, 150)">
    <!-- Server tower -->
    <rect x="15" y="20" width="70" height="120" rx="6" fill="#f3e8ff" stroke="#a855f7" stroke-width="2"/>

    <!-- Server slots -->
    <rect x="25" y="35" width="50" height="18" rx="2" fill="#e9d5ff" stroke="#a855f7" stroke-width="1"/>
    <circle cx="35" cy="44" r="3" fill="#16a34a"/>
    <circle cx="50" cy="44" r="3" fill="#16a34a"/>
    <circle cx="65" cy="44" r="3" fill="#16a34a"/>

    <rect x="25" y="60" width="50" height="18" rx="2" fill="#e9d5ff" stroke="#a855f7" stroke-width="1"/>
    <circle cx="35" cy="69" r="3" fill="#16a34a"/>
    <circle cx="50" cy="69" r="3" fill="#16a34a"/>
    <circle cx="65" cy="69" r="3" fill="#16a34a"/>

    <rect x="25" y="85" width="50" height="18" rx="2" fill="#e9d5ff" stroke="#a855f7" stroke-width="1"/>
    <circle cx="35" cy="94" r="3" fill="#16a34a"/>
    <circle cx="50" cy="94" r="3" fill="#16a34a"/>
    <circle cx="65" cy="94" r="3" fill="#16a34a"/>

    <rect x="25" y="110" width="50" height="18" rx="2" fill="#e9d5ff" stroke="#a855f7" stroke-width="1"/>
    <circle cx="35" cy="119" r="3" fill="#16a34a"/>
    <circle cx="50" cy="119" r="3" fill="#16a34a"/>
    <circle cx="65" cy="119" r="3" fill="#16a34a"/>

    <text x="50" y="155" font-family="Arial" font-size="11" font-weight="bold" text-anchor="middle" fill="#7e22ce">Server</text>
  </g>

  <!-- Connection lines -->
  <line x1="190" y1="150" x2="280" y2="150" stroke="#0ea5e9" stroke-width="2" opacity="0.5" stroke-dasharray="5,5"/>
  <line x1="190" y1="180" x2="280" y2="200" stroke="#ec4899" stroke-width="2" opacity="0.5" stroke-dasharray="5,5"/>

  <!-- Top right - API icon -->
  <g transform="translate(380, 80)">
    <rect x="0" y="0" width="50" height="50" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="25" y="32" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle" fill="#f59e0b">API</text>
  </g>

  <!-- Bottom decorative elements -->
  <circle cx="100" cy="420" r="8" fill="#06b6d4" opacity="0.3"/>
  <circle cx="380" cy="450" r="6" fill="#a855f7" opacity="0.3"/>
  <circle cx="420" cy="380" r="7" fill="#0ea5e9" opacity="0.3"/>

  <!-- Tech stack labels at bottom -->
  <text x="250" y="480" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#1e293b">Modern Tech Stack</text>
</svg>